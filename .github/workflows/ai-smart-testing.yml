name: 🤖 AI-Powered Smart Testing

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize]

env:
  NODE_VERSION: '18'

jobs:
  # ============================================================================
  # STEP 1: AI reads the change
  # ============================================================================
  ai-analyze-changes:
    name: 🤖 AI Analyzes Changes
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.detect.outputs.all_changed_files }}
      ai_analysis: ${{ steps.ai_analyze.outputs.analysis }}
      tests_to_run: ${{ steps.ai_analyze.outputs.tests_to_run }}
      tests_to_skip: ${{ steps.ai_analyze.outputs.tests_to_skip }}
      impact_score: ${{ steps.ai_analyze.outputs.impact_score }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: detect
        uses: tj-actions/changed-files@v40
        with:
          files: |
            src/**
            backend/**
            package.json

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      # ✅ STEP 1: AI READS THE CHANGE
      - name: 🤖 AI Analyzes Code Changes
        id: ai_analyze
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CHANGED_FILES: ${{ steps.detect.outputs.all_changed_files }}
        with:
          script: |
            const { OpenAI } = require('openai');
            
            const openai = new OpenAI({
              apiKey: process.env.OPENAI_API_KEY,
            });
            
            const changedFiles = process.env.CHANGED_FILES.split('\n').filter(f => f.trim());
            console.log('📁 Changed files:', changedFiles);
            
            if (!changedFiles || changedFiles.length === 0) {
              core.setOutput('analysis', JSON.stringify({
                impactScore: 0,
                testsToRun: ['frontend', 'backend', 'e2e'],
                testsToSkip: [],
              }));
              core.setOutput('tests_to_run', JSON.stringify(['frontend', 'backend', 'e2e']));
              core.setOutput('tests_to_skip', JSON.stringify([]));
              core.setOutput('impact_score', 0);
              return;
            }
            
            const prompt = `
            You are a smart QA system. Analyze these code changes and determine:
            1. Impact score (0-100): How risky is this change?
            2. Which test suites should run: frontend, backend, e2e
            3. Which tests can be skipped
            
            Changed files:
            ${changedFiles.join('\n')}
            
            Respond in JSON only (no other text):
            {
              "impactScore": 0-100,
              "testsToRun": ["frontend"|"backend"|"e2e"],
              "testsToSkip": []
            }
            `;
            
            try {
              const response = await openai.chat.completions.create({
                model: 'gpt-4-turbo',
                messages: [{ role: 'user', content: prompt }],
                temperature: 0.3,
              });
              
              const content = response.choices[0].message.content.trim();
              const analysis = JSON.parse(content);
              
              core.setOutput('analysis', JSON.stringify(analysis));
              core.setOutput('tests_to_run', JSON.stringify(analysis.testsToRun));
              core.setOutput('tests_to_skip', JSON.stringify(analysis.testsToSkip || []));
              core.setOutput('impact_score', analysis.impactScore);
              
              console.log('✅ AI Analysis Complete');
              console.log('📊 Impact Score:', analysis.impactScore);
              console.log('✅ Tests to Run:', analysis.testsToRun.join(', '));
              console.log('⏭️  Tests to Skip:', analysis.testsToSkip?.join(', ') || 'none');
            } catch (error) {
              console.error('❌ AI analysis failed:', error.message);
              // Fallback: run all tests
              core.setOutput('analysis', JSON.stringify({
                impactScore: 100,
                testsToRun: ['frontend', 'backend', 'e2e'],
                testsToSkip: [],
              }));
              core.setOutput('tests_to_run', JSON.stringify(['frontend', 'backend', 'e2e']));
              core.setOutput('tests_to_skip', JSON.stringify([]));
              core.setOutput('impact_score', 100);
            }

  # ============================================================================
  # STEP 2: Run Frontend Tests (picked by AI)
  # ============================================================================
  run-frontend-tests:
    name: 🧪 Frontend Tests
    needs: ai-analyze-changes
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.tests.outputs.passed }}
      failed: ${{ steps.tests.outputs.failed }}
      total: ${{ steps.tests.outputs.total }}
      test_results: ${{ steps.tests.outputs.test_results }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: 🧪 Run Frontend Tests
        id: tests
        run: |
          # Only run if AI says to run frontend tests
          if [[ '${{ needs.ai-analyze-changes.outputs.tests_to_run }}' == *'frontend'* ]]; then
            npm test -- --json --outputFile=test-results-frontend.json --passWithNoTests 2>&1 || true
          else
            echo "⏭️  Frontend tests skipped by AI analysis"
            echo '{"numPassedTests": 0, "numFailedTests": 0, "numTotalTests": 0}' > test-results-frontend.json
          fi
          
          # Parse results
          if [ -f test-results-frontend.json ]; then
            PASSED=$(jq '.numPassedTests' test-results-frontend.json)
            FAILED=$(jq '.numFailedTests' test-results-frontend.json)
            TOTAL=$(jq '.numTotalTests' test-results-frontend.json)
          else
            PASSED=0
            FAILED=0
            TOTAL=0
          fi
          
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "test_results=$(cat test-results-frontend.json | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-frontend
          path: test-results-frontend.json

  # ============================================================================
  # STEP 3: Run Backend Tests (picked by AI)
  # ============================================================================
  run-backend-tests:
    name: 🧪 Backend Tests
    needs: ai-analyze-changes
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    outputs:
      passed: ${{ steps.tests.outputs.passed }}
      failed: ${{ steps.tests.outputs.failed }}
      total: ${{ steps.tests.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: 🧪 Run Backend Tests
        id: tests
        env:
          MONGO_URI: mongodb://localhost:27017/test-db
          JWT_SECRET: test-secret
        run: |
          # Only run if AI says to run backend tests
          if [[ '${{ needs.ai-analyze-changes.outputs.tests_to_run }}' == *'backend'* ]]; then
            cd backend
            npm test -- --json --outputFile=../test-results-backend.json --passWithNoTests 2>&1 || true
          else
            echo "⏭️  Backend tests skipped by AI analysis"
            echo '{"numPassedTests": 0, "numFailedTests": 0, "numTotalTests": 0}' > ../test-results-backend.json
          fi
          
          if [ -f ../test-results-backend.json ]; then
            PASSED=$(jq '.numPassedTests' ../test-results-backend.json)
            FAILED=$(jq '.numFailedTests' ../test-results-backend.json)
            TOTAL=$(jq '.numTotalTests' ../test-results-backend.json)
          else
            PASSED=0
            FAILED=0
            TOTAL=0
          fi
          
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-backend
          path: test-results-backend.json

  # ============================================================================
  # STEP 4: Run E2E Tests (picked by AI)
  # ============================================================================
  run-e2e-tests:
    name: 🎭 E2E Tests
    needs: ai-analyze-changes
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    outputs:
      passed: ${{ steps.tests.outputs.passed }}
      failed: ${{ steps.tests.outputs.failed }}
      total: ${{ steps.tests.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
          cd backend && npm ci

      - name: 🎭 Run E2E Tests
        id: tests
        env:
          MONGO_URI: mongodb://localhost:27017/test-db
          JWT_SECRET: test-secret
          NODE_ENV: test
        run: |
          # Only run if AI says to run e2e tests
          if [[ '${{ needs.ai-analyze-changes.outputs.tests_to_run }}' == *'e2e'* ]]; then
            npm run e2e -- --reporter=json > e2e-results.json 2>&1 || true
          else
            echo "⏭️  E2E tests skipped by AI analysis"
            echo '{"suites": [{"tests": []}]}' > e2e-results.json
          fi
          
          if [ -f e2e-results.json ]; then
            PASSED=$(jq '[.suites[].tests[] | select(.pass==true)] | length' e2e-results.json)
            FAILED=$(jq '[.suites[].tests[] | select(.pass==false)] | length' e2e-results.json)
            TOTAL=$(jq '[.suites[].tests[]] | length' e2e-results.json)
          else
            PASSED=0
            FAILED=0
            TOTAL=0
          fi
          
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e-results.json

  # ============================================================================
  # STEP 5: AI analyzes test results & files bugs
  # ============================================================================
  ai-analyze-failures:
    name: 🤖 AI Analyzes Failures
    needs: [ai-analyze-changes, run-frontend-tests, run-backend-tests, run-e2e-tests]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      failures_found: ${{ steps.ai_failure.outputs.failures_found }}
      jira_issue: ${{ steps.ai_failure.outputs.jira_issue }}
      failure_summary: ${{ steps.ai_failure.outputs.failure_summary }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download all test results
        uses: actions/download-artifact@v3

      - name: Install dependencies
        run: npm ci

      # ✅ STEP 5: AI FILES BUGS
      - name: 🤖 AI Analyzes Failures & Files Bugs
        id: ai_failure
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JIRA_HOST: ${{ secrets.JIRA_HOST }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        with:
          script: |
            const fs = require('fs');
            const axios = require('axios');
            const { OpenAI } = require('openai');
            
            const openai = new OpenAI({
              apiKey: process.env.OPENAI_API_KEY,
            });
            
            // Collect test results
            function readResultFile(path) {
              try {
                return JSON.parse(fs.readFileSync(path, 'utf8'));
              } catch (e) {
                console.log('⚠️  Could not read', path);
                return null;
              }
            }
            
            const testResults = {
              frontend: readResultFile('test-results-frontend/test-results-frontend.json'),
              backend: readResultFile('test-results-backend/test-results-backend.json'),
              e2e: readResultFile('e2e-results/e2e-results.json'),
            };
            
            // Check if there are failures
            let hasFailures = false;
            let failureInfo = [];
            
            if (testResults.frontend?.numFailedTests > 0) {
              hasFailures = true;
              failureInfo.push(`Frontend: ${testResults.frontend.numFailedTests} failed`);
            }
            if (testResults.backend?.numFailedTests > 0) {
              hasFailures = true;
              failureInfo.push(`Backend: ${testResults.backend.numFailedTests} failed`);
            }
            
            if (!hasFailures) {
              core.setOutput('failures_found', false);
              core.setOutput('jira_issue', 'None');
              core.setOutput('failure_summary', JSON.stringify({ status: 'all_passed' }));
              return;
            }
            
            // AI analyzes failures
            const prompt = `
            These tests are failing:
            ${failureInfo.join('\n')}
            
            Provide:
            1. Root cause (what's likely wrong)
            2. Category: logic_bug, flaky_test, environment, or other
            3. Severity: critical, high, medium, low
            4. Fix suggestion
            
            Respond in JSON only:
            {
              "rootCause": "...",
              "category": "...",
              "severity": "...",
              "fixSuggestion": "..."
            }
            `;
            
            try {
              const response = await openai.chat.completions.create({
                model: 'gpt-4-turbo',
                messages: [{ role: 'user', content: prompt }],
                temperature: 0.3,
              });
              
              const analysis = JSON.parse(response.choices[0].message.content.trim());
              
              // Create JIRA issue
              let jiraIssueKey = 'None';
              if (process.env.JIRA_HOST && process.env.JIRA_API_TOKEN && process.env.JIRA_PROJECT_KEY) {
                try {
                  const issue = {
                    fields: {
                      project: { key: process.env.JIRA_PROJECT_KEY },
                      summary: `[${analysis.category}] Test failure: ${analysis.rootCause.substring(0, 50)}`,
                      description: `Root cause: ${analysis.rootCause}\n\nFix: ${analysis.fixSuggestion}`,
                      issuetype: { name: 'Bug' },
                      labels: ['automated-test', 'ai-analyzed', `pr-${context.issue.number}`],
                    },
                  };
                  
                  const jiraResponse = await axios.post(
                    `${process.env.JIRA_HOST}/rest/api/3/issues`,
                    issue,
                    {
                      headers: {
                        Authorization: `Bearer ${process.env.JIRA_API_TOKEN}`,
                        'Content-Type': 'application/json',
                      },
                    }
                  );
                  jiraIssueKey = jiraResponse.data.key;
                  console.log('✅ JIRA Issue created:', jiraIssueKey);
                } catch (error) {
                  console.warn('⚠️  Could not create JIRA issue:', error.message);
                }
              }
              
              core.setOutput('failures_found', true);
              core.setOutput('jira_issue', jiraIssueKey);
              core.setOutput('failure_summary', JSON.stringify(analysis));
            } catch (error) {
              console.error('❌ AI analysis failed:', error.message);
              core.setOutput('failures_found', true);
              core.setOutput('jira_issue', 'None');
              core.setOutput('failure_summary', JSON.stringify({ error: error.message }));
            }

  # ============================================================================
  # STEP 6: Mark PR with results
  # ============================================================================
  mark-pr:
    name: ✅ Mark PR
    needs: [ai-analyze-changes, run-frontend-tests, run-backend-tests, run-e2e-tests, ai-analyze-failures]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ✅ STEP 6: MARK THE PR
      - name: ✅ Post Results to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const impactScore = parseInt('${{ needs.ai-analyze-changes.outputs.impact_score }}') || 0;
            const frontendPassed = parseInt('${{ needs.run-frontend-tests.outputs.passed }}') || 0;
            const frontendFailed = parseInt('${{ needs.run-frontend-tests.outputs.failed }}') || 0;
            const backendPassed = parseInt('${{ needs.run-backend-tests.outputs.passed }}') || 0;
            const backendFailed = parseInt('${{ needs.run-backend-tests.outputs.failed }}') || 0;
            const e2ePassed = parseInt('${{ needs.run-e2e-tests.outputs.passed }}') || 0;
            const e2eFailed = parseInt('${{ needs.run-e2e-tests.outputs.failed }}') || 0;
            const failuresFound = '${{ needs.ai-analyze-failures.outputs.failures_found }}' === 'true';
            const jiraIssue = '${{ needs.ai-analyze-failures.outputs.jira_issue }}' || 'None';
            
            // Build impact badge
            let impactBadge = '🟢';
            if (impactScore > 70) impactBadge = '🔴';
            else if (impactScore > 40) impactBadge = '🟡';
            
            // Build comment
            let comment = `## ${impactBadge} AI Smart Testing Results\n\n`;
            comment += `**Impact Score**: ${impactScore}/100\n\n`;
            
            comment += `### Frontend Tests\n`;
            if (frontendPassed === 0 && frontendFailed === 0) {
              comment += `- ⏭️  Skipped by AI analysis\n\n`;
            } else {
              comment += `- ✅ Passed: ${frontendPassed}\n`;
              comment += `- ❌ Failed: ${frontendFailed}\n\n`;
            }
            
            comment += `### Backend Tests\n`;
            if (backendPassed === 0 && backendFailed === 0) {
              comment += `- ⏭️  Skipped by AI analysis\n\n`;
            } else {
              comment += `- ✅ Passed: ${backendPassed}\n`;
              comment += `- ❌ Failed: ${backendFailed}\n\n`;
            }
            
            comment += `### E2E Tests\n`;
            if (e2ePassed === 0 && e2eFailed === 0) {
              comment += `- ⏭️  Skipped by AI analysis\n\n`;
            } else {
              comment += `- ✅ Passed: ${e2ePassed}\n`;
              comment += `- ❌ Failed: ${e2eFailed}\n\n`;
            }
            
            if (failuresFound) {
              comment += `### 🚨 Issues Found\n`;
              if (jiraIssue !== 'None') {
                const jiraHost = '${{ secrets.JIRA_HOST }}';
                comment += `- JIRA: [${jiraIssue}](${jiraHost}/browse/${jiraIssue})\n`;
              }
            } else {
              comment += `### ✅ All Tests Passed!\n`;
            }
            
            try {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            } catch (error) {
              console.log('⚠️  Could not create PR comment:', error.message);
            }

      - name: ✅ Set PR Status
        uses: actions/github-script@v7
        with:
          script: |
            const failuresFound = '${{ needs.ai-analyze-failures.outputs.failures_found }}' === 'true';
            const status = failuresFound ? 'failure' : 'success';
            
            github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: '🤖 AI Smart Testing',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: failuresFound ? 'failure' : 'success',
              output: {
                title: failuresFound ? '❌ Tests Failed' : '✅ All Tests Passed',
                summary: 'AI-powered smart testing pipeline',
              },
            });
