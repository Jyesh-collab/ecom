name: Smart PR Testing Pipeline with JIRA

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'backend/**'
      - 'package.json'
      - '.github/workflows/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    name: Detect Changed Files & Map Tests
    runs-on: ubuntu-latest
    outputs:
      affected-tests: ${{ steps.detect.outputs.tests }}
      has-frontend-changes: ${{ steps.detect.outputs.has-frontend }}
      has-backend-changes: ${{ steps.detect.outputs.has-backend }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          json: true

      - name: Detect affected tests
        id: detect
        run: |
          CHANGED_FILES='${{ steps.changed-files.outputs.all_changed_files }}'
          
          echo "Frontend changes:"
          echo "$CHANGED_FILES" | jq '.[] | select(startswith("src/"))'
          
          echo "Backend changes:"
          echo "$CHANGED_FILES" | jq '.[] | select(startswith("backend/"))'
          
          echo "has-frontend=$(echo $CHANGED_FILES | jq 'map(select(startswith("src/"))) | length > 0')" >> $GITHUB_OUTPUT
          echo "has-backend=$(echo $CHANGED_FILES | jq 'map(select(startswith("backend/"))) | length > 0')" >> $GITHUB_OUTPUT
          echo "tests=[]" >> $GITHUB_OUTPUT

      - name: Comment PR - Tests Starting
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **Smart PR Testing Started**\n\nRunning affected tests...\n\n- 🔍 Analyzing changed files\n- ⚙️ Running frontend tests\n- ⚙️ Running backend tests\n- 🎭 Running E2E tests with Playwright'
            });

  run-frontend-tests:
    name: Run Frontend Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.has-frontend-changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        id: test
        run: npm test -- --ci --coverage --passWithNoTests
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: frontend

      - name: Save test result
        if: steps.test.outcome == 'failure'
        run: echo "FRONTEND_TEST_FAILED=true" >> $GITHUB_ENV

  run-backend-tests:
    name: Run Backend Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.has-backend-changes == 'true'
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Cache backend dependencies
        uses: actions/cache@v3
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: Install frontend dependencies
        run: npm install

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend tests
        id: test
        working-directory: backend
        run: npm test -- --ci --coverage --passWithNoTests
        env:
          MONGO_URI: mongodb://localhost:27017/test-ecommerce
          JWT_SECRET: test_secret_key
          SKIP_SEED_ON_START: 'true'
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./backend/coverage/coverage-final.json
          flags: backend

      - name: Save test result
        if: steps.test.outcome == 'failure'
        run: echo "BACKEND_TEST_FAILED=true" >> $GITHUB_ENV

  run-playwright-tests:
    name: Run E2E Tests with Playwright
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run E2E tests
        id: playwright
        run: npx playwright test
        env:
          MONGO_URI: mongodb://localhost:27017/test-ecommerce
          JWT_SECRET: test_secret_key
          PORT: 3001
          SKIP_SEED_ON_START: 'true'
        continue-on-error: true
        timeout-minutes: 10

      - name: Upload Playwright report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Save Playwright result
        if: steps.playwright.outcome == 'failure'
        run: echo "PLAYWRIGHT_TEST_FAILED=true" >> $GITHUB_ENV

  create-jira-issue-on-failure:
    name: Create JIRA Issue
    needs: [run-frontend-tests, run-backend-tests, run-playwright-tests]
    runs-on: ubuntu-latest
    if: |
      failure() ||
      contains(needs.run-frontend-tests.result, 'failure') ||
      contains(needs.run-backend-tests.result, 'failure') ||
      contains(needs.run-playwright-tests.result, 'failure')
    steps:
      - uses: actions/checkout@v3

      - name: Create JIRA issue
        id: create-issue
        run: |
          RESPONSE=$(curl -s -X POST ${{ secrets.JIRA_HOST }}/rest/api/3/issues \
            -H "Authorization: Bearer ${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "fields": {
                "project": {"key": "${{ secrets.JIRA_PROJECT_KEY }}"},
                "summary": "PR #${{ github.event.pull_request.number }} - Automated Test Failure",
                "description": {
                  "version": 3,
                  "type": "doc",
                  "content": [
                    {
                      "type": "paragraph",
                      "content": [
                        {
                          "type": "text",
                          "text": "Automated test failure detected in PR\n\nTitle: ${{ github.event.pull_request.title }}\nAuthor: ${{ github.event.pull_request.user.login }}\nURL: ${{ github.event.pull_request.html_url }}"
                        }
                      ]
                    }
                  ]
                },
                "issuetype": {"name": "Bug"},
                "priority": {"name": "High"},
                "labels": ["automated-test", "github-actions", "pr-${{ github.event.pull_request.number }}"]
              }
            }')
          echo "JIRA_RESPONSE=$RESPONSE" >> $GITHUB_ENV
          echo "$RESPONSE" | jq -r '.key // .errorMessages[0]'

      - name: Comment PR - Tests Failed with JIRA Link
        uses: actions/github-script@v7
        with:
          script: |
            const testResults = {
              frontend: '${{ needs.run-frontend-tests.result }}',
              backend: '${{ needs.run-backend-tests.result }}',
              playwright: '${{ needs.run-playwright-tests.result }}'
            };

            let failedTests = [];
            if (testResults.frontend === 'failure') failedTests.push('❌ Frontend Tests');
            if (testResults.backend === 'failure') failedTests.push('❌ Backend Tests');
            if (testResults.playwright === 'failure') failedTests.push('❌ E2E Tests (Playwright)');

            const body = `**Test Results:**\n${failedTests.join('\n')}\n\n🐛 **JIRA Issue Created** - A bug has been automatically created in JIRA\n\nProject: ${{ secrets.JIRA_PROJECT_KEY }}\n\n📊 [View Test Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  post-success-comment:
    name: Post Success Comment
    needs: [run-frontend-tests, run-backend-tests, run-playwright-tests]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Comment PR - Tests Passed
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **All Tests Passed!**\n\n🎉 Your PR is ready for review.\n\n✨ Smart testing pipeline completed successfully.'
            });
