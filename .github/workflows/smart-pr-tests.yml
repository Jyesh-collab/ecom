name: Smart PR Testing Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: smart-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write
  contents: read

env:
  NODE_VERSION: '18'
  BASE_URL: 'http://localhost:3000'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. AI Test Intelligence Gate — Claude analyses the diff and decides which
  #    tests to run. This job MUST pass before anything else proceeds.
  # ─────────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: "🤖 AI Test Intelligence Gate"
    runs-on: ubuntu-latest
    outputs:
      test-files: ${{ steps.resolve.outputs.test-files }}
      changed-files: ${{ steps.changed.outputs.files }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get changed files
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          FILES=$(git diff --name-only "$BASE" "$HEAD" | tr '\n' ',')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed files: $FILES"

      - name: "🤖 AI selects relevant tests (Claude via OpenRouter)"
        id: resolve
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          CHANGED="${{ steps.changed.outputs.files }}"
          NEWLINE_FILES=$(echo "$CHANGED" | tr ',' '\n')
          TEST_FILES=$(echo "$NEWLINE_FILES" | node scripts/resolve-tests.js)
          echo "test-files=$TEST_FILES" >> "$GITHUB_OUTPUT"
          echo "Claude selected test files: $TEST_FILES"

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Post "Test automation triggered" comment on the PR
  # ─────────────────────────────────────────────────────────────────────────────
  notify-triggered:
    name: Post Triggered Comment
    runs-on: ubuntu-latest
    needs: detect-changes

    steps:
      - name: Post triggered comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const testFiles = `${{ needs.detect-changes.outputs.test-files }}`;
            const changedFiles = `${{ needs.detect-changes.outputs.changed-files }}`
              .split(',').filter(Boolean);

            const fileList = changedFiles.map(f => `  - \`${f}\``).join('\n');
            const testList = testFiles.split(' ').filter(Boolean).map(t => `  - \`${t}\``).join('\n');

            const body = [
              '## 🤖 Test automation triggered',
              '',
              '**Changed files detected:**',
              fileList,
              '',
              '**Tests selected for this PR:**',
              testList,
              '',
              `> Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Start the app and run only the relevant Playwright tests
  # ─────────────────────────────────────────────────────────────────────────────
  run-tests:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, notify-triggered]

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Install frontend deps (includes craco)
      - name: Install frontend dependencies
        run: npm ci

      # Install backend deps
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      # Install Playwright and Allure reporter
      - name: Install Playwright and Allure reporter
        run: npm install --save-dev @playwright/test allure-playwright

      # Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Install Allure CLI to generate HTML report from results
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # Start backend — use MONGO_URI (matches backend/index.js)
      - name: "🚀 Start backend server"
        env:
          MONGO_URI: mongodb://localhost:27017/ecom_test
          JWT_SECRET: test-secret-key-for-ci
          PORT: 5000
          NODE_ENV: test
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_HOST: ${{ secrets.PINECONE_HOST }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd backend && npm start &
          echo "Waiting for backend to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:5000/api/products > /dev/null 2>&1; then
              echo "✅ Backend is up (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30 — not ready yet, retrying in 2s..."
            sleep 2
          done
          echo "❌ Backend failed to start after 60 seconds"
          echo "--- Backend process output ---"
          cat /tmp/backend.log 2>/dev/null || true
          exit 1

      # Seed the test database with products so tests have data to work with
      - name: "🌱 Seed test database"
        env:
          MONGO_URI: mongodb://localhost:27017/ecom_test
        run: node seed-ci.js
        working-directory: backend

      # Start frontend (CRACO) — REACT_APP_API_BASE_URL points to local backend
      - name: "🚀 Start frontend dev server"
        env:
          REACT_APP_API_BASE_URL: http://localhost:5000/api
          CI: false
        run: |
          npm start > /tmp/frontend.log 2>&1 &
          echo "Waiting for frontend to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Frontend is up (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30 — not ready yet, retrying in 2s..."
            sleep 2
          done
          echo "❌ Frontend failed to start after 60 seconds"
          echo "--- Frontend process output ---"
          cat /tmp/frontend.log || true
          exit 1

      # Run only the resolved test files
      - name: "🧪 Run Playwright tests"
        id: playwright
        env:
          BASE_URL: ${{ env.BASE_URL }}
          ALLURE_RESULTS_DIR: allure-results
        run: |
          TEST_FILES="${{ needs.detect-changes.outputs.test-files }}"
          if [ -z "$TEST_FILES" ]; then
            echo "❌ No test files resolved — cannot run tests"
            exit 1
          fi
          echo "Running: npx playwright test $TEST_FILES"
          npx playwright test $TEST_FILES \
            --output=test-results 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      # Capture failed test names from JSON report
      - name: "📋 Extract failed test names"
        id: failed-names
        if: steps.playwright.outputs.exit_code != '0'
        run: |
          FAILED=$(node -e "
            const r = require('./test-results/results.json');
            const names = r.suites.flatMap(s =>
              s.specs.filter(sp => sp.tests.some(t => t.status === 'failed' || t.status === 'timedOut'))
                     .map(sp => sp.title)
            );
            console.log([...new Set(names)].join('\n'));
          " 2>/dev/null || echo 'Could not parse results.json')
          echo "names<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FAILED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # Write environment info into the Allure report
      - name: "📝 Write Allure environment info"
        if: always()
        run: |
          mkdir -p allure-results
          cat > allure-results/environment.properties << EOF
          PR_Number=${{ github.event.pull_request.number }}
          PR_Title=${{ github.event.pull_request.title }}
          Branch=${{ github.head_ref }}
          Commit=${{ github.event.pull_request.head.sha }}
          Base_URL=http://localhost:3000
          Node_Version=18
          Browser=Chromium
          EOF

      # Generate Allure HTML report from raw results
      - name: "📊 Generate Allure report"
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: "📦 Upload Allure report"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-pr-${{ github.event.pull_request.number }}
          path: allure-report/
          retention-days: 14

      - name: "📦 Upload Playwright raw results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-pr-${{ github.event.pull_request.number }}
          path: |
            test-results/
            test-output.txt
          retention-days: 14

      # Expose exit code as a job output — this is what drives on-failure / on-success
      - name: "🏁 Set final test status"
        id: test-status
        if: always()
        run: |
          CODE="${{ steps.playwright.outputs.exit_code }}"
          if [ "$CODE" = "0" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "✅ All tests passed"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
            echo "❌ Tests failed — exit code: $CODE"
            exit 1
          fi

    outputs:
      status: ${{ steps.test-status.outputs.status }}
      failed-names: ${{ steps.failed-names.outputs.names }}
      error-log: ${{ steps.playwright.outputs.exit_code }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 4a. On FAILURE → create Jira defect and post link as PR comment
  # ─────────────────────────────────────────────────────────────────────────────
  on-failure:
    name: Create Jira Defect & Notify
    runs-on: ubuntu-latest
    needs: [run-tests]
    if: needs.run-tests.outputs.status == 'failure'

    steps:
      - uses: actions/checkout@v4

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: test-artifacts/

      - name: Read error log
        id: error-log
        run: |
          LOG=$(cat test-artifacts/test-output.txt 2>/dev/null | head -200 || echo 'No output captured')
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Jira defect
        id: jira
        env:
          JIRA_HOST: ${{ secrets.JIRA_HOST }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          FAILED_TESTS: ${{ needs.run-tests.outputs.failed-names }}
          ERROR_DETAILS: ${{ steps.error-log.outputs.log }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          OUTPUT=$(node scripts/create-jira-defect.js)
          echo "$OUTPUT"
          JIRA_KEY=$(echo "$OUTPUT" | grep '^JIRA_ISSUE_KEY=' | cut -d= -f2)
          JIRA_URL=$(echo "$OUTPUT" | grep '^JIRA_ISSUE_URL=' | cut -d= -f2)
          echo "key=$JIRA_KEY" >> "$GITHUB_OUTPUT"
          echo "url=$JIRA_URL" >> "$GITHUB_OUTPUT"

      - name: Post failure comment with Jira link
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const jiraKey  = '${{ steps.jira.outputs.key }}';
            const jiraUrl  = '${{ steps.jira.outputs.url }}';
            const prNumber = context.issue.number;
            const runUrl   = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const failedTests = `${{ needs.run-tests.outputs.failed-names }}`
              .split('\n').filter(Boolean).map(t => `  - ${t}`).join('\n') || '  _(see report)_';

            const body = [
              '## ❌ E2E Tests Failed',
              '',
              '**Failed tests:**',
              failedTests,
              '',
              `**Jira defect created:** [${jiraKey}](${jiraUrl})`,
              '',
              `**Full report:** [GitHub Actions Run](${runUrl})`,
              '',
              '_Please fix the failing tests before merging._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

  # ─────────────────────────────────────────────────────────────────────────────
  # 4b. On SUCCESS → post success comment
  # ─────────────────────────────────────────────────────────────────────────────
  on-success:
    name: Post Success Comment
    runs-on: ubuntu-latest
    needs: [detect-changes, run-tests]
    if: needs.run-tests.outputs.status == 'success'

    steps:
      - name: Post success comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const testFiles = `${{ needs.detect-changes.outputs.test-files }}`
              .split(' ').filter(Boolean).map(t => `  - \`${t}\``).join('\n');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              '## ✅ All E2E Tests Passed',
              '',
              '**Tests executed:**',
              testFiles,
              '',
              `**Report:** [GitHub Actions Run](${runUrl})`,
              '',
              '_This PR is clear for review and merge._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
